# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/workflow_engine_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Sabari@2006
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8080

# ── Mail (Gmail SMTP) ──────────────────────────────────────────────────────────
#
# B2 FIX: original file had:
#   spring.mail.password=${bjfjjxspunqbcqbq}
#
# Spring treats ${...} as a property placeholder expression and tries to
# resolve "bjfjjxspunqbcqbq" as an environment variable or another property key.
# Since neither exists, startup throws:
#   IllegalArgumentException: Could not resolve placeholder 'bjfjjxspunqbcqbq'
#
# The app password is a literal string — write it directly without ${ }.
# If you need to keep credentials out of source control, use an environment
# variable instead:  spring.mail.password=${MAIL_APP_PASSWORD}
# and export MAIL_APP_PASSWORD=bjfjjxspunqbcqbq in your shell / CI environment.
#
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sabarivenkatesan2962006@gmail.com
spring.mail.password=bjfjjxspunqbcqbq
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

